[pytest]
# Pytest configuration for Vigil

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = executor/tests monitor/tests jira_integrator/tests tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=executor
    --cov=monitor
    --cov=jira_integrator
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external services)
    slow: Slow tests (require Docker, network, etc.)
    health: Tests related to health analysis
    monitoring: Tests related to browser monitoring
    jira: Tests related to Jira integration
    whatsapp: Tests related to WhatsApp interface

# Coverage settings
[coverage:run]
source = .
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */site-packages/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
